<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔐 Secure Chat</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .chat-container {
        width: 480px;
        background: #1e1e2e;
        border-radius: 20px;
        box-shadow: 0 0 25px rgba(0, 255, 200, 0.3);
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    .header {
        background: #00ffcc;
        color: black;
        text-align: center;
        padding: 15px;
        font-size: 22px;
        font-weight: bold;
    }

    .messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
    }

    .msg {
        margin: 10px 0;
        padding: 10px 15px;
        border-radius: 12px;
        max-width: 80%;
        word-wrap: break-word;
        font-size: 15px;
        position: relative;
        box-shadow: 0 0 8px rgba(255,255,255,0.1);
    }

    .sent {
        align-self: flex-end;
        background: #0078ff;
    }

    .received {
        align-self: flex-start;
        background: #30363d;
    }

    .timestamp {
        font-size: 11px;
        opacity: 0.7;
        margin-top: 4px;
        text-align: right;
    }

    .input-area {
        display: flex;
        border-top: 1px solid #333;
    }

    input {
        flex: 1;
        padding: 12px;
        border: none;
        font-size: 15px;
        outline: none;
        background: #121212;
        color: white;
        border-radius: 0 0 0 12px;
    }

    button {
        background: #00ffcc;
        border: none;
        padding: 12px 20px;
        font-size: 15px;
        cursor: pointer;
        border-radius: 0 0 12px 0;
    }

    button:hover {
        background: #00e6b8;
    }

    .encrypted {
        font-size: 11px;
        color: #aaa;
        margin-top: 2px;
    }
</style>
</head>
<body>
<div class="chat-container">
    <div class="header">🔒 Secure Chat</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input id="msgInput" type="text" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const ws = new WebSocket("ws://172.18.12.14:8080/ws/chat");
    const messagesDiv = document.getElementById("messages");

    ws.onopen = () => {
        addMessage("Connected securely ✅", "received");
    };

    ws.onmessage = (event) => {
        addMessage(event.data, "received", true);
    };

    function sendMessage() {
        const msgInput = document.getElementById("msgInput");
        const message = msgInput.value.trim();
        if (message === "") return;
        ws.send(message);
        addMessage(message, "sent");
        msgInput.value = "";
    }

    function addMessage(text, type, encrypted = false) {
        const msg = document.createElement("div");
        msg.classList.add("msg", type);

        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        if (encrypted) {
            msg.innerHTML = `
                <div>🔐 <b>Encrypted:</b> ${text}</div>
                <div class="encrypted">[Decrypted Automatically]</div>
                <div class="timestamp">${time}</div>
            `;
        } else {
            msg.innerHTML = `
                <div>${text}</div>
                <div class="timestamp">${time}</div>
            `;
        }

        messagesDiv.appendChild(msg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
</script>
</body>
</html>
